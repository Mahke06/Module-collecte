<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - VOLY VARY</title>
<link rel="stylesheet" href="../../assets/css/variables.css">
<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<template id="tpl-page">
  <div class="page-heading">
    <div><h1>Mon profil</h1><p>Gerez vos informations personnelles</p></div>
  </div>

  <div class="profile-grid">
    <div class="card">
      <div class="card-body profile-summary">
        <div class="profile-avatar" id="profile-avatar"></div>
        <h3 id="profile-name"></h3>
        <span class="badge badge-blue" id="profile-role"></span>
        <p class="profile-email" id="profile-email"></p>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><h3>Informations personnelles</h3></div>
      <div class="card-body">
        <form id="form-profile" class="form-grid">
          <div class="form-field"><label>Nom complet</label><input name="name" id="in-name"></div>
          <div class="form-field"><label>Email</label><input type="email" name="email" id="in-email"></div>
          <div class="form-field full"><label>Telephone</label><input name="telephone" placeholder="034 00 000 00"></div>
          <div class="form-field full" style="margin-top:8px"><button type="submit" class="btn btn-primary">Enregistrer les modifications</button></div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><h3>Mot de passe</h3></div>
      <div class="card-body">
        <form id="form-password" class="form-grid">
          <div class="form-field full"><label>Mot de passe actuel</label><input type="password" name="current" required></div>
          <div class="form-field"><label>Nouveau mot de passe</label><input type="password" name="new" required></div>
          <div class="form-field"><label>Confirmation</label><input type="password" name="confirm" required></div>
          <div class="form-field full" style="margin-top:8px"><button type="submit" class="btn btn-outline">Changer le mot de passe</button></div>
        </form>
      </div>
    </div>
  </div>
</template>

<script src="../../assets/js/toast.js"></script>
<script src="../../assets/js/modal.js"></script>
<script>window.APP_DEPTH = 2;</script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script src="script.js"></script>
</body>
</html>
