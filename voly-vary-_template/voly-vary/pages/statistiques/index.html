<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiques - VOLY VARY</title>
<link rel="stylesheet" href="../../assets/css/variables.css">
<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<template id="tpl-page">
  <div class="page-heading">
    <div><h1>Statistiques</h1><p>Analyse globale de l'activite VOLY VARY</p></div>
    <select id="stat-period" style="padding:8px 12px;border:1px solid var(--color-gray-200);border-radius:var(--radius-sm);font-size:var(--fs-sm)">
      <option>Ce mois</option>
      <option>Ce trimestre</option>
      <option>Cette annee</option>
    </select>
  </div>

  <div class="stat-grid" id="stat-cards"></div>

  <div class="dash-grid">
    <div class="card">
      <div class="card-head"><h3>Transactions vs Collectes (barres)</h3></div>
      <div class="card-body"><canvas id="chart-bar" height="260"></canvas></div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Repartition des modules</h3></div>
      <div class="card-body"><canvas id="chart-pie" height="260"></canvas></div>
    </div>
  </div>

  <div class="dash-grid" style="margin-top:16px">
    <div class="card">
      <div class="card-head"><h3>Tendance sur 12 mois (lignes)</h3></div>
      <div class="card-body"><canvas id="chart-line" height="260"></canvas></div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Distribution par statut</h3></div>
      <div class="card-body"><canvas id="chart-doughnut" height="260"></canvas></div>
    </div>
  </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="../../assets/js/toast.js"></script>
<script src="../../assets/js/modal.js"></script>
<script>window.APP_DEPTH = 2;</script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script src="script.js"></script>
</body>
</html>
