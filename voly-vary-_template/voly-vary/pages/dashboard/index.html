<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - VOLY VARY</title>
<link rel="stylesheet" href="../../assets/css/variables.css">
<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<template id="tpl-page">
  <div class="page-heading">
    <div>
      <h1>Tableau de bord</h1>
      <p>Vue d'ensemble de l'activite VOLY VARY</p>
    </div>
  </div>

  <div class="stat-grid" id="stat-grid"></div>

  <div class="dash-grid">
    <div class="card">
      <div class="card-head">
        <h3>Evolution de l'activite</h3>
        <select id="chart-range" style="padding:6px 10px;border:1px solid var(--color-gray-200);border-radius:var(--radius-sm);font-size:var(--fs-xs)">
          <option>7 derniers jours</option>
          <option selected>30 derniers jours</option>
          <option>12 derniers mois</option>
        </select>
      </div>
      <div class="card-body"><canvas id="chart-activity" height="260"></canvas></div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Repartition par module</h3></div>
      <div class="card-body"><canvas id="chart-repartition" height="260"></canvas></div>
    </div>
  </div>

  <div class="dash-grid" style="margin-top:16px">
    <div class="card">
      <div class="card-head"><h3>Activites recentes</h3></div>
      <div class="card-body" id="activity-list"></div>
    </div>
    <div class="card">
      <div class="card-head"><h3>Notifications</h3></div>
      <div class="card-body" id="notif-list"></div>
    </div>
  </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="../../assets/js/toast.js"></script>
<script src="../../assets/js/modal.js"></script>
<script>window.APP_DEPTH = 2;</script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script src="script.js"></script>
</body>
</html>
